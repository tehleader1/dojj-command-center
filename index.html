
<!DOCTYPE html>
<html>

<head>

  <title>Dojj Command Center</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    body {

      margin: 0;

      background:
        linear-gradient(
          180deg,
          #020617,
          #0f172a
        );

      color: white;

      font-family: Arial, sans-serif;

      display: flex;

      justify-content: center;

      align-items: center;

      min-height: 100vh;

    }

    .panel {

      width: 90%;
      max-width: 420px;

      background:
        rgba(30,41,59,0.92);

      padding: 30px;

      border-radius: 24px;

      border:
        1px solid rgba(255,255,255,0.08);

      backdrop-filter: blur(12px);

      box-shadow:
        0 0 60px rgba(56,189,248,0.12);

    }

    h1 {

      margin-top: 0;

    }

    input {

      width: 100%;

      padding: 14px;

      margin-top: 16px;

      border-radius: 12px;

      border: none;

      background: #111827;

      color: white;

      font-size: 18px;

      box-sizing: border-box;

    }

    button {

      width: 100%;

      padding: 14px;

      margin-top: 16px;

      border-radius: 12px;

      border: none;

      background: #38bdf8;

      color: black;

      font-size: 18px;

      font-weight: bold;

    }

    .hidden {

      display: none;

    }

    .card {

      background: #111827;

      padding: 18px;

      border-radius: 16px;

      margin-top: 16px;

    }

    .tag {

      color: #38bdf8;

      font-weight: bold;

      margin-bottom: 10px;

    }

  </style>

</head>

<body>

<div class="panel" id="gate">

  <h1>🔐 Dojj Command Center</h1>

  <p>
    Secure operational access required.
  </p>

  <input
    id="code"
    maxlength="6"
    placeholder="Enter 6-digit code"
  >

  <button onclick="unlock()">
    Access System
  </button>

  <p id="error" style="color:#f87171;"></p>

</div>

<div class="panel hidden" id="dashboard">

  <h1>🚀 Dojj Operations</h1>

  <div class="card">

    <div class="tag">CONNECTED BUSINESSES</div>

    <p>SupportRD.com</p>
    <p>DigitalHut.app</p>
    <p>ThePlantManInc.com</p>
    <p>LasersMarket.com</p>

  </div>

  <div class="card">

    <div class="tag">RADIUS SCANNER</div>

    <p>
      Charlotte 100-mile scanner active.
    </p>

  </div>

  <div class="card">

    <div class="tag">RECRUITING</div>

    <p>
      Engineer + architecture quality review layer active.
    </p>

  </div>

</div>

<script>

function unlock() {

  const code =
    document.getElementById("code").value;

  if (code === "123456") {

    localStorage.setItem(
      "dojj_access",
      "true"
    );

    document
      .getElementById("gate")
      .classList.add("hidden");

    document
      .getElementById("dashboard")
      .classList.remove("hidden");

  } else {

    document
      .getElementById("error")
      .innerText =
      "Invalid security code";

  }

}

if (
  localStorage.getItem("dojj_access")
  === "true"
) {

  document
    .getElementById("gate")
    .classList.add("hidden");

  document
    .getElementById("dashboard")
    .classList.remove("hidden");

}

</script>

</body>

</html>
